name: Deploy Angular to S3

on:
  push:
    branches:
      - TMS_UI

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Install dependencies
        run: |
          cd Web
          npm install --legacy-peer-deps

      - name: Build Angular app
        run: |
          cd Web
          npm run build -- --configuration=production

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-west-2

      - name: Remove existing files from S3
        run: aws s3 rm s3://${{ secrets.S3_BUCKET }} --recursive

      - name: Upload new build to S3
        run: aws s3 cp Web/dist/trex-web/browser s3://${{ secrets.S3_BUCKET }} --recursive