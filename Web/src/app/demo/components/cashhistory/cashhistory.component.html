<div class="grid">
    <div class="col-12">
        <div class="header_main">
            <h1>Cash History</h1>
        </div>
        <div class="card p-fluid">
            <div class="card_container">
                <p-table
                    [value]="cashHistories"
                    [paginator]="true"
                    [rows]="10"
                    [rowsPerPageOptions]="[10, 25, 50]"
                    [resizableColumns]="true"
                    [reorderableColumns]="true"
                    [globalFilterFields]="['BankAccountNumber', 'Currency', 'Market', 'Metadata', 'Entity']"
                    sortMode="multiple"
                    responsiveLayout="scroll">

                    <ng-template pTemplate="caption">
                        <div class="flex justify-content-between align-items-center">
                            <div class="flex align-items-center gap-2">
                                <span><strong>Group By</strong></span>
                                <p-dropdown
                                    [options]="groupByFields"
                                    [(ngModel)]="selectedGroupByField"
                                    (onChange)="onGroupChange($event.value)"
                                    optionLabel="name"
                                    optionValue="code"
                                    placeholder="Select Field"
                                    style="width: 200px">
                                </p-dropdown>
                            </div>
                            <div class="flex align-items-center gap-4">
                                <button pButton type="button" icon="pi pi-file-excel" label="Excel" [style.backgroundColor]="'#1f5770'"></button>
                                <button pButton type="button" icon="pi pi-file-pdf" label="PDF" [style.backgroundColor]="'#1f5770'"></button>
                            </div>
                        </div>
                    </ng-template>

                    <ng-template pTemplate="header">
                        <tr>
                            <th *ngIf="selectedGroupByField.code !== 'BankAccountNumber'">Account Number</th>
                            <th *ngIf="selectedGroupByField.code !== 'Currency'">Currency</th>
                            <th *ngIf="selectedGroupByField.code !== 'Market'">Market</th>
                            <th *ngIf="selectedGroupByField.code !== 'Metadata'">Metadata</th>
                            <th *ngIf="selectedGroupByField.code !== 'Entity'">Entity</th>
                            <th>Type</th>
                            <th *ngFor="let day of [1,2,3,4,5,6,7]">{{ getDate(-day) }}</th>
                        </tr>
                    </ng-template>

                    <ng-template pTemplate="body" let-row>
                        <tr>
                            <td *ngIf="selectedGroupByField.code !== 'BankAccountNumber'">{{ row.BankAccountNumber }}</td>
                            <td *ngIf="selectedGroupByField.code !== 'Currency'">
                                <div class="flex align-items-center gap-2">
                                    <i [class]="getCurrencyClass(row.Currency)"></i> {{ row.Currency }}
                                </div>
                            </td>
                            <td *ngIf="selectedGroupByField.code !== 'Market'">{{ row.Market }}</td>
                            <td *ngIf="selectedGroupByField.code !== 'Metadata'">{{ row.Metadata }}</td>
                            <td *ngIf="selectedGroupByField.code !== 'Entity'">
                                <div class="flex align-items-center gap-2">
                                    <img [src]="getBankImageUrl(row.Entity)" alt="{{ row.Entity }}" width="30">
                                    <span class="font-bold">{{ row.Entity }}</span>
                                </div>
                            </td>
                            <td>{{ row.BalanceType }}</td>
                            <td *ngFor="let day of [1,2,3,4,5,6,7]">
                                {{ row['Day' + day] | currency: row.Currency }}
                            </td>
                        </tr>
                    </ng-template>
                </p-table>
            </div>
        </div>
    </div>
</div>
