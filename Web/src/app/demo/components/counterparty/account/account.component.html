<div class="grid">
    <div class="col-12">
        <div class="card p-fluid">
            <h5><i class="pi pi-fw pi-dollar"></i>CounterParty - Account</h5>

            <div class="field grid">
                <label class="col-3 mb-2 md:col-3 md:mb-2">
                    <b>CounterParty Account</b>
                </label>
                <div class="col-4 mb-2 md:col-4 md:mb-2">
                    <p-dropdown
                        inputId="multiselect"
                        [options]="counterpartyAccount"
                        [(ngModel)]="selectedcounterpartyAccount"
                        optionLabel="name"
                    >
                    </p-dropdown>
                </div>
            </div>
            <div class="field grid">
                <label htmlFor="bank" class="col-3 mb-2 md:col-3 md:mb-2"
                    ><b>Bank</b></label
                >
                <div class="col-4 mb-2 md:col-4 md:mb-2">
                    <input
                        pInputText
                        id="bank"
                        type="text"
                        [disabled]="true"
                        value="Hsbc London Uk"
                    />
                </div>
            </div>
            <div class="field grid">
                <label
                    htmlFor="accountNumber"
                    class="col-3 mb-2 md:col-3 md:mb-2"
                    ><b>Account Number</b></label
                >
                <div class="col-4 mb-2 md:col-4 md:mb-2">
                    <input
                        pInputText
                        id="accountNumber"
                        type="text"
                        [disabled]="true"
                        value="987654321"
                    />
                </div>
            </div>
            <div class="field grid">
                <label htmlFor="country" class="col-3 mb-2 md:col-3 md:mb-2"
                    ><b>Country</b></label
                >
                <div class="col-4 mb-2 md:col-4 md:mb-2">
                    <input
                        pInputText
                        id="country"
                        type="text"
                        [disabled]="true"
                        value="Uk"
                    />
                </div>
            </div>
            <div class="field grid">
                <label htmlFor="swift_bic" class="col-3 mb-2 md:col-3 md:mb-2"
                    ><b>Swift\Bic</b></label
                >
                <div class="col-4 mb-2 md:col-4 md:mb-2">
                    <input
                        pInputText
                        id="swift_bic"
                        type="text"
                        [disabled]="true"
                        value="Swift-12345"
                    />
                </div>
            </div>
            <div class="field grid">
                <label htmlFor="currency" class="col-3 mb-2 md:col-3 md:mb-2"
                    ><b>Currency</b></label
                >
                <div class="col-4 mb-2 md:col-4 md:mb-2">
                    <input
                        pInputText
                        id="currency"
                        type="text"
                        [disabled]="true"
                        value="Gbp"
                    />
                </div>
            </div>
            <div class="field grid">
                <label class="col-3 mb-2 md:col-3 md:mb-2">
                    <b>Is Active</b>
                </label>
                <div class="col-4 mb-2 md:col-4 md:mb-2">
                    <p-checkbox value="isactive" inputId="isactive" />
                    <label for="isactive" class="ml-2 md:ml-2">Is Active</label>
                </div>
            </div>

            <div class="field grid">
                <h5>Save</h5>
                <p-dialog
                    header="Save"
                    [(visible)]="display"
                    [modal]="true"
                    showEffect="fade"
                    [style]="{ width: '30vw' }"
                    [breakpoints]="{ '960px': '75vw' }"
                >
                    <p class="line-height-3 m-0">Data Saved Successfully</p>
                    <ng-template pTemplate="footer">
                        <button
                            pButton
                            icon="pi pi-Save"
                            (click)="display = false"
                            label="Ok"
                            class="p-button-save"
                        ></button>
                    </ng-template>
                </p-dialog>

                <div class="col-2 mb-2 md:col-1.5 md:mb-2">
                    <button
                        (click)="display = true"
                        pButton
                        icon="pi pi-save"
                        label="Save"
                    ></button>
                </div>
            </div>

            <div class="field grid">
                <h5>Clear</h5>
                <p-confirmDialog
                    header="clear"
                    key="clear2"
                    icon="pi pi-exclamation-triangle"
                    message="Are you sure you want to proceed?"
                    [style]="{ width: '350px' }"
                    acceptButtonStyleClass="p-button-text"
                    rejectButtonStyleClass="p-button-text"
                ></p-confirmDialog>

                <div class="col-2 mb-2 md:col-2 md:mb-2">
                    <button
                        type="text"
                        (click)="clear2()"
                        pButton
                        icon="pi pi-trash"
                        label="clear"
                        class="p-button-danger"
                        style="width: auto"
                    ></button>
                </div>
            </div>
        </div>
    </div>
</div>
