<div class="grid">
    <div class="col-12">
        <div class="card p-fluid">
            <h5><i class="pi pi-fw pi-dollar"></i> Counter Parties</h5>
            <kendo-grid
                [kendoGridBinding]="accountdata"
                [pageSize]="20"
                [pageable]="true"
                [sortable]="true"
                [filterable]="filterMode"
                [groupable]="true"
                style="width: 100%"
            >
                <kendo-grid-column field="name" title="Name">
                    <ng-template
                        kendoGridCellTemplate
                        let-dataItem
                        let-rowIndex="rowIndex"
                    >
                        <a
                            href="javascript:void(0)"
                            (click)="handlePopup(dataItem)"
                        >
                            {{ dataItem.name }}
                        </a>
                    </ng-template>
                </kendo-grid-column>
                <kendo-grid-column
                    field="accountName"
                    title="Account Name"
                    width="150"
                >
                    <ng-template kendoGridHeaderTemplate let-column="column">
                        <div class="header-container">
                            <span class="bold-header">{{ column.title }}</span>
                        </div>
                    </ng-template>
                    <ng-template kendoGridCellTemplate let-dataItem="dataItem">
                        <span>{{ dataItem.accountName }}</span>
                    </ng-template>
                </kendo-grid-column>
                <kendo-grid-column field="country" title="Country">
                    <ng-template
                        kendoGridCellTemplate
                        let-dataItem
                        let-rowIndex="rowIndex"
                    >
                        <div class="flex align-items-center gap-2">
                            <img
                                [src]="getCountryImageUrl(dataItem.country)"
                                class="shadow-4"
                                alt="{{ dataItem.country }}"
                                width="30"
                            />
                            <span> {{ dataItem.country }} </span>
                        </div>
                    </ng-template>
                </kendo-grid-column>
                <kendo-grid-column field="currency" title="Currency">
                    <ng-template
                        kendoGridCellTemplate
                        let-dataItem
                        let-rowIndex="rowIndex"
                    >
                        <i [class]="getCurrencyClass(dataItem.currency)"></i>
                        {{ dataItem.currency }}
                    </ng-template>
                </kendo-grid-column>
                <kendo-grid-column
                    field="isActive"
                    title="Is Active"
                    width="150"
                >
                    <ng-template kendoGridHeaderTemplate let-column="column">
                        <div class="header-container">
                            <span class="bold-header">{{ column.title }}</span>
                        </div>
                    </ng-template>
                    <ng-template kendoGridCellTemplate let-dataItem="dataItem">
                        <span>{{ dataItem.isActive }}</span>
                    </ng-template>
                </kendo-grid-column>
            </kendo-grid>
            <p-dialog
                [(visible)]="displayOverlay"
                [modal]="true"
                showEffect="fade"
                [style]="{ width: '70vw' }"
                [breakpoints]="{ '960px': '75vw' }"
            >
                <ng-template pTemplate="header">
                    <div class="flex align-items-center gap-2"></div>
                </ng-template>
                <div class="col-12">
                    <div class="grid m-0 p-0">
                        <div class="col-12 m-0 p-0">
                            <p-divider layout="horizontal" align="left">
                                <span class="p-tag">Account Deails</span>
                            </p-divider>
                            <div class="field grid">
                                <div class="col-6">
                                    <div class="field grid">
                                        <label
                                            htmlFor="accountName"
                                            class="col-4 md:col-4 mb-0 md:mb-0"
                                        >
                                            <b>Account Name</b>
                                        </label>
                                        <div class="col-7 md:col-7">
                                            <input
                                                pInputText
                                                id="accountName"
                                                type="text"
                                                [disabled]="false"
                                            />
                                        </div>
                                    </div>
                                </div>
                                <div class="col-6">
                                    <div class="field grid">
                                        <label
                                            htmlFor="currency"
                                            class="col-4 md:col-4 mb-0 md:mb-0"
                                            ><b>Currency</b></label
                                        >
                                        <div class="col-7 md:col-7">
                                            <p-dropdown
                                                [options]="currencies"
                                                [(ngModel)]="selectedCurrency"
                                                optionLabel="name"
                                                placeholder="Select a Currency"
                                            >
                                            </p-dropdown>
                                        </div>
                                    </div>
                                </div>
                                <div class="col-6">
                                    <div class="field grid">
                                        <label
                                            htmlFor="entity"
                                            class="col-4 md:col-4 mb-0 md:mb-0"
                                            ><b>Country</b></label
                                        >
                                        <div class="col-7 md:col-7">
                                            <p-dropdown
                                                [options]="countries"
                                                [(ngModel)]="selectedCountry"
                                                optionLabel="name"
                                                placeholder="Select a Country"
                                            >
                                            </p-dropdown>
                                        </div>
                                    </div>
                                </div>
                                <div class="col-6">
                                    <div class="field grid">
                                        <label
                                            htmlFor="accountNumber"
                                            class="col-4 md:col-4 mb-0 md:mb-0"
                                            ><b>Account Number</b></label
                                        >
                                        <div class="col-7 md:col-7">
                                            <input
                                                pInputText
                                                id="accountNumber"
                                                type="text"
                                                [disabled]="false"
                                            />
                                        </div>
                                    </div>
                                </div>
                                <div class="col-6">
                                    <div class="field grid">
                                        <label
                                            htmlFor="iban"
                                            class="col-4 md:col-4 mb-0 md:mb-0"
                                        >
                                            <b>IBAN</b></label
                                        >
                                        <div class="col-7 md:col-7">
                                            <input
                                                pInputText
                                                id="iban"
                                                type="text"
                                                [disabled]="false"
                                            />
                                        </div>
                                    </div>
                                </div>
                                <div class="col-6">
                                    <div class="field grid">
                                        <label
                                            htmlFor="swift_bic"
                                            class="col-4 md:col-4 mb-0 md:mb-0"
                                            ><b>SWIFT</b></label
                                        >
                                        <div class="col-7 md:col-7">
                                            <input
                                                pInputText
                                                id="swift_bic"
                                                type="text"
                                                [disabled]="false"
                                            />
                                        </div>
                                    </div>
                                </div>
                                <div class="col-6">
                                    <div class="field grid">
                                        <label
                                            htmlFor="trexid"
                                            class="col-4 md:col-4 mb-0 md:mb-0"
                                            ><b>TrexId</b></label
                                        >
                                        <div class="col-7 md:col-7">
                                            <input
                                                pInputText
                                                id="trexid"
                                                type="text"
                                                [disabled]="true"
                                            />
                                        </div>
                                    </div>
                                </div>
                                <div class="col-6">
                                    <div class="field grid">
                                        <label
                                            htmlFor="isACtive"
                                            class="col-4 md:col-4 mb-0 md:mb-0"
                                            ><b>Is Active</b></label
                                        >
                                        <div>
                                            <input
                                                pInputText
                                                id="isActive"
                                                type="checkbox"
                                                [disabled]="false"
                                            />
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                        <ng-template pTemplate="footer">
                            <button
                                pButton
                                icon="pi pi-check"
                                (click)="displayOverlay = false"
                                label="Ok"
                                class="p-button-outlined"
                            ></button>
                        </ng-template>
                    </div>
                </div>
            </p-dialog>
        </div>
    </div>
</div>
